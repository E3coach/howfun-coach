<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Howfun 乒乓聚樂部</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#1a73e8;--primary-dark:#1557b0;--primary-light:#e8f0fe;
  --bg:#f5f5f5;--surface:#fff;--border:#e0e0e0;
  --text:#212121;--text2:#757575;--text3:#bdbdbd;
  --red:#d32f2f;--green:#2e7d32;--amber:#f57c00;
  --sidebar:260px;--radius:8px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue','Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}

/* Loading */
#loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:16px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Login */
#login-screen{min-height:100vh;display:none;align-items:center;justify-content:center;background:var(--bg)}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:2rem;width:100%;max-width:360px;margin:1rem}
.login-logo{text-align:center;margin-bottom:1.5rem}
.login-logo-icon{width:56px;height:56px;background:var(--primary);border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto .75rem;color:#fff;font-size:28px}
.login-logo h1{font-size:18px;font-weight:700;color:var(--text)}
.login-logo p{font-size:12px;color:var(--text2);margin-top:2px}
.lf{margin-bottom:.875rem}
.lf label{display:block;font-size:13px;color:var(--text2);margin-bottom:4px;font-weight:500}
.lf input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;outline:none;background:#fff;color:var(--text)}
.lf input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(26,115,232,.12)}
.btn-login{width:100%;padding:11px;background:var(--primary);color:#fff;border:none;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;margin-top:.25rem}
.btn-login:hover{background:var(--primary-dark)}
.login-err{color:var(--red);font-size:13px;text-align:center;margin-top:.75rem;display:none}

/* App Layout */
#app{display:none;min-height:100vh}
.topbar{position:fixed;top:0;left:0;right:0;height:48px;background:var(--primary);color:#fff;display:flex;align-items:center;padding:0 1rem;z-index:100;gap:12px}
.topbar-menu-btn{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;display:none;padding:4px;line-height:1}
.topbar-title{font-size:15px;font-weight:700;flex:1}
.topbar-user{font-size:13px;opacity:.9}
.btn-toplogout{background:rgba(255,255,255,.2);border:none;color:#fff;padding:5px 12px;border-radius:20px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:4px}
.btn-toplogout:hover{background:rgba(255,255,255,.3)}

/* Sidebar */
.sidebar{position:fixed;top:48px;left:0;bottom:0;width:var(--sidebar);background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;z-index:90;transition:transform .25s}
.sidebar-section{border-bottom:1px solid var(--border)}
.sidebar-group-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;user-select:none;text-transform:uppercase;letter-spacing:.5px}
.sidebar-group-header:hover{background:var(--bg)}
.sidebar-group-header i.arrow{font-size:16px;transition:transform .2s}
.sidebar-group-header.open i.arrow{transform:rotate(90deg)}
.sidebar-items{display:none}
.sidebar-items.open{display:block}
.sidebar-item{display:flex;align-items:center;gap:8px;padding:10px 16px 10px 28px;font-size:14px;color:var(--text);cursor:pointer;border-left:3px solid transparent}
.sidebar-item:hover{background:var(--primary-light);color:var(--primary)}
.sidebar-item.active{background:var(--primary-light);color:var(--primary);border-left-color:var(--primary);font-weight:600}
.sidebar-item i{font-size:17px}
.sidebar-bottom{padding:12px 0;border-top:1px solid var(--border)}

/* Main content */
.main{margin-left:var(--sidebar);margin-top:48px;padding:1.5rem;min-height:calc(100vh - 48px)}
.page{display:none}
.page.active{display:block}
.page-title{font-size:20px;font-weight:700;margin-bottom:1.25rem;color:var(--text)}

/* Cards & Tables */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem}
.card-title{font-size:15px;font-weight:600;margin-bottom:1rem;display:flex;align-items:center;gap:8px}
.card-title i{font-size:18px;color:var(--primary)}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:1.25rem}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;text-align:center}
.stat-num{font-size:26px;font-weight:700;color:var(--primary)}
.stat-label{font-size:12px;color:var(--text2);margin-top:4px}

table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 12px;font-size:12px;font-weight:600;color:var(--text2);border-bottom:2px solid var(--border);background:var(--bg)}
td{padding:10px 12px;font-size:14px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa}
.table-wrap{overflow-x:auto}

/* Badges */
.badge{display:inline-flex;align-items:center;font-size:11px;padding:2px 8px;border-radius:12px;font-weight:600}
.b-green{background:#e8f5e9;color:var(--green)}
.b-amber{background:#fff3e0;color:var(--amber)}
.b-red{background:#ffebee;color:var(--red)}
.b-blue{background:var(--primary-light);color:var(--primary)}
.b-gray{background:#f5f5f5;color:#757575}

/* Progress bar */
.prog-wrap{min-width:80px}
.prog-bar{height:6px;background:var(--bg);border-radius:3px;margin-top:4px}
.prog-fill{height:100%;background:var(--primary);border-radius:3px}

/* Buttons */
.btn{padding:8px 16px;border-radius:var(--radius);font-size:13px;cursor:pointer;font-weight:500;display:inline-flex;align-items:center;gap:6px;border:none}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-dark)}
.btn-outline{background:#fff;color:var(--primary);border:1px solid var(--primary)}
.btn-outline:hover{background:var(--primary-light)}
.btn-danger{background:#fff;color:var(--red);border:1px solid #ef9a9a}
.btn-danger:hover{background:#ffebee}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-success{background:var(--green);color:#fff}
.btn-success:hover{background:#1b5e20}

/* Forms */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:600px){.form-grid{grid-template-columns:1fr}}
.ff{margin-bottom:.875rem}
.ff label{display:block;font-size:13px;color:var(--text2);margin-bottom:4px;font-weight:500}
.ff input,.ff select,.ff textarea{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;background:#fff;color:var(--text);outline:none}
.ff input:focus,.ff select:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(26,115,232,.1)}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center;padding:1rem}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:var(--radius);padding:1.5rem;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.modal-head{font-size:16px;font-weight:700;margin-bottom:1.25rem;display:flex;align-items:center;justify-content:space-between}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--text2);line-height:1}
.modal-foot{display:flex;justify-content:flex-end;gap:8px;margin-top:1.25rem;padding-top:1rem;border-top:1px solid var(--border)}

/* Toast */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:#323232;color:#fff;padding:10px 18px;border-radius:var(--radius);font-size:13px;z-index:999;display:none;align-items:center;gap:8px;max-width:320px;box-shadow:0 4px 16px rgba(0,0,0,.2);font-weight:500}
.toast.show{display:flex}

/* Search bar */
.search-bar{position:relative;margin-bottom:1rem}
.search-bar input{width:100%;padding:9px 12px 9px 36px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;background:#fff;outline:none}
.search-bar input:focus{border-color:var(--primary)}
.search-bar i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:17px}

/* Section header */
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:.5rem}

/* Mobile overlay for sidebar */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:89}

/* Salary card */
.salary-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;margin-bottom:.75rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.salary-info{flex:1}
.salary-name{font-size:15px;font-weight:600}
.salary-meta{font-size:12px;color:var(--text2);margin-top:3px}
.salary-amount{font-size:20px;font-weight:700;color:var(--green);text-align:right}
.salary-sessions{font-size:12px;color:var(--text2);text-align:right}

/* Empty */
.empty{text-align:center;padding:3rem 1rem;color:var(--text2)}
.empty i{font-size:40px;color:var(--text3);display:block;margin-bottom:.75rem}

/* Responsive */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.open{display:block}
  .main{margin-left:0}
  .topbar-menu-btn{display:flex}
  .stats-row{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<!-- Loading -->
<div id="loading-screen">
  <div class="spinner"></div>
  <div style="font-size:13px;color:var(--text2)">連線中…</div>
</div>

<!-- Login -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-logo-icon"><i class="ti ti-table-tennis"></i></div>
      <h1>Howfun 乒乓聚樂部</h1>
      <p>教練管理系統</p>
    </div>
    <div class="lf"><label>帳號</label><input type="text" id="lu" placeholder="輸入帳號"></div>
    <div class="lf"><label>密碼</label><input type="password" id="lp" placeholder="輸入密碼" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn-login" onclick="doLogin()">登入</button>
    <div class="login-err" id="lerr">帳號或密碼錯誤，請再試一次</div>
  </div>
</div>

<!-- App -->
<div id="app">
  <!-- Topbar -->
  <div class="topbar">
    <button class="topbar-menu-btn" onclick="toggleSidebar()"><i class="ti ti-menu-2"></i></button>
    <div class="topbar-title">Howfun 乒乓聚樂部</div>
    <span class="topbar-user" id="topbar-user"></span>
    <button class="btn-toplogout" onclick="doLogout()"><i class="ti ti-logout" style="font-size:14px"></i>登出</button>
  </div>

  <!-- Sidebar overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <!-- 教練 -->
    <div class="sidebar-section">
      <div class="sidebar-group-header open" onclick="toggleGroup(this)">
        <span><i class="ti ti-users" style="margin-right:6px;font-size:16px"></i>教練</span>
        <i class="ti ti-chevron-right arrow"></i>
      </div>
      <div class="sidebar-items open">
        <div class="sidebar-item active" onclick="showPage('students')" data-page="students">
          <i class="ti ti-user-check"></i>學員管理
        </div>
        <div class="sidebar-item" onclick="showPage('salary')" data-page="salary">
          <i class="ti ti-coin"></i>教練個人薪資
        </div>
      </div>
    </div>
    <!-- 課程 -->
    <div class="sidebar-section">
      <div class="sidebar-group-header open" onclick="toggleGroup(this)">
        <span><i class="ti ti-calendar" style="margin-right:6px;font-size:16px"></i>課程</span>
        <i class="ti ti-chevron-right arrow"></i>
      </div>
      <div class="sidebar-items open">
        <div class="sidebar-item" onclick="showPage('cards')" data-page="cards">
          <i class="ti ti-credit-card"></i>課程卡管理
        </div>
        <div class="sidebar-item" onclick="showPage('checkin')" data-page="checkin">
          <i class="ti ti-calendar-check"></i>上課簽到
        </div>
        <div class="sidebar-item" onclick="showPage('history')" data-page="history">
          <i class="ti ti-history"></i>課程卡歷史
        </div>
      </div>
    </div>
    <!-- 底部 -->
    <div class="sidebar-bottom">
      <div class="sidebar-item" onclick="showPage('password')" data-page="password">
        <i class="ti ti-lock"></i>修改密碼
      </div>
      <div class="sidebar-item admin-only" onclick="showPage('all-salary')" data-page="all-salary">
        <i class="ti ti-report-money"></i>所有教練薪資
      </div>
      <div class="sidebar-item admin-only" onclick="showPage('coaches')" data-page="coaches">
        <i class="ti ti-shield-check"></i>教練帳號管理
      </div>
    </div>
  </div>

  <!-- Main -->
  <div class="main">

    <!-- 學員管理 -->
    <div class="page active" id="page-students">
      <div class="page-title">學員管理</div>
      <div class="stats-row" id="student-stats"></div>
      <div class="card">
        <div class="sec-head">
          <div class="card-title" style="margin:0"><i class="ti ti-users"></i>學員列表</div>
          <button class="btn btn-primary" onclick="openModal('add-student')"><i class="ti ti-plus"></i>新增學員</button>
        </div>
        <div class="search-bar" style="margin-top:.75rem">
          <i class="ti ti-search"></i>
          <input type="text" placeholder="搜尋學員姓名或電話…" oninput="renderStudents(this.value)">
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>姓名</th><th>電話</th><th>負責教練</th><th>課程卡</th><th>狀態</th><th>操作</th></tr></thead>
            <tbody id="students-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- 教練薪資 -->
    <div class="page" id="page-salary">
      <div class="page-title" id="salary-page-title">教練個人薪資</div>
      <div class="card">
        <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
          <div style="display:flex;align-items:center;gap:8px;font-size:13px">
            <label style="color:var(--text2);font-weight:500">開始：</label>
            <input type="date" id="salary-start" style="padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;outline:none">
          </div>
          <div style="display:flex;align-items:center;gap:8px;font-size:13px">
            <label style="color:var(--text2);font-weight:500">結束：</label>
            <input type="date" id="salary-end" style="padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;outline:none">
          </div>
          <button class="btn btn-primary" onclick="calcSalary()"><i class="ti ti-check"></i>確認</button>
        </div>
      </div>
      <div id="salary-result"></div>
    </div>
    <div class="page" id="page-cards">
      <div class="page-title">課程卡管理</div>
      <div class="card">
        <div class="sec-head">
          <div class="card-title" style="margin:0"><i class="ti ti-credit-card"></i>課程卡列表</div>
          <button class="btn btn-primary" onclick="openModal('add-card')"><i class="ti ti-plus"></i>新增課程卡</button>
        </div>
        <div class="table-wrap" style="margin-top:.75rem">
          <table>
            <thead><tr><th>開卡日期</th><th>班別</th><th>學員</th><th>堂數（剩餘/總數）</th><th>收款人</th><th>金額</th><th>狀態</th><th>操作</th></tr></thead>
            <tbody id="cards-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- 上課簽到 -->
    <div class="page" id="page-checkin">
      <div class="page-title">上課簽到</div>
      <div class="card">
        <div class="form-grid">
          <div class="ff"><label>班別</label>
            <select id="ci-class" onchange="onClassChange()">
              <option value="個人班">個人班</option>
              <option value="幼兒班">幼兒班</option>
              <option value="團體班">團體班</option>
              <option value="社團">社團</option>
              <option value="校隊">校隊</option>
              <option value="其他">其他</option>
            </select>
          </div>
          <div class="ff"><label>日期</label><input type="date" id="ci-date"></div>
        </div>
        <div class="form-grid">
          <div class="ff"><label>開始</label><select id="ci-start" onchange="onStartChange()"></select></div>
          <div class="ff"><label>結束</label><select id="ci-end"></select></div>
        </div>
        <div class="ff"><label>備註（選填）</label><input type="text" id="ci-note" placeholder="課程內容、地點…"></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:.5rem">
          <div>
            <div style="font-size:13px;font-weight:600;color:var(--text2);margin-bottom:8px">上課學員 <span id="ci-selected-count" style="font-weight:400;color:var(--primary)"></span></div>
            <div id="ci-selected" onclick="removeStudent(event)" style="border:1px solid var(--border);border-radius:var(--radius);min-height:200px;max-height:320px;overflow-y:auto;padding:6px;background:#f9fffe;cursor:pointer"></div>
            <div style="font-size:11px;color:var(--text2);margin-top:4px">← 點擊移除</div>
          </div>
          <div>
            <div style="font-size:13px;font-weight:600;color:var(--text2);margin-bottom:8px">此班學員</div>
            <div id="ci-all" onclick="addStudent(event)" style="border:1px solid var(--border);border-radius:var(--radius);min-height:200px;max-height:320px;overflow-y:auto;padding:6px;background:#fff;cursor:pointer"></div>
            <div style="font-size:11px;color:var(--text2);margin-top:4px">點擊加入 →</div>
          </div>
        </div>
        <button class="btn btn-success" style="margin-top:1.25rem;width:100%;justify-content:center;padding:11px" onclick="doCheckin()"><i class="ti ti-check"></i>完成簽到</button>
      </div>
    </div>
    <!-- 課程卡歷史 -->
    <div class="page" id="page-history">
      <div class="page-title">課程卡歷史</div>
      <div class="card">
        <div class="card-title"><i class="ti ti-eye-off"></i>已隱藏課程卡</div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>開卡日期</th><th>班別</th><th>學員</th><th>堂數</th><th>收款人</th><th>金額</th><th>操作</th></tr></thead>
            <tbody id="hidden-cards-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
    <!-- 修改密碼 -->
    <div class="page" id="page-password">
      <div class="page-title">修改密碼</div>
      <div class="card" style="max-width:400px">
        <div class="card-title"><i class="ti ti-lock"></i>變更登入密碼</div>
        <div class="ff"><label>目前密碼</label><input type="password" id="pw-old" placeholder="輸入目前密碼"></div>
        <div class="ff"><label>新密碼</label><input type="password" id="pw-new" placeholder="輸入新密碼"></div>
        <div class="ff"><label>確認新密碼</label><input type="password" id="pw-confirm" placeholder="再次輸入新密碼"></div>
        <button class="btn btn-primary" onclick="changePassword()"><i class="ti ti-check"></i>更改密碼</button>
      </div>
    </div>

    <div class="page" id="page-all-salary">
      <div class="page-title">所有教練薪資</div>
      <div class="card">
        <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
          <div style="display:flex;align-items:center;gap:8px;font-size:13px">
            <label style="color:var(--text2);font-weight:500">開始：</label>
            <input type="date" id="allsal-start" style="padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;outline:none">
          </div>
          <div style="display:flex;align-items:center;gap:8px;font-size:13px">
            <label style="color:var(--text2);font-weight:500">結束：</label>
            <input type="date" id="allsal-end" style="padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;outline:none">
          </div>
          <button class="btn btn-primary" onclick="calcAllSalary()"><i class="ti ti-check"></i>確認</button>
        </div>
      </div>
      <div id="allsal-result"></div>
    </div>

    <div class="page" id="page-coaches">

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, set, get, push, update, remove }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const firebaseConfig = {

const fireApp = initializeApp(firebaseConfig);
const db = getDatabase(fireApp);

let currentUser = null;
const $ = id => document.getElementById(id);
const objArr = obj => obj ? Object.entries(obj).map(([id,v])=>({id,...v})) : [];
const rem = s => {
  const cards = objArr(payments).filter(p=>p.studentId===s.id&&!p.hidden);
  if(cards.length===0) return (s.totalSessions||0)-(s.usedSessions||0);
  return cards.reduce((sum,p)=>sum+(p.sessions-(p.usedSessions||0)),0);
};
const remTotal = s => {
  const cards = objArr(payments).filter(p=>p.studentId===s.id&&!p.hidden);
  if(cards.length===0) return s.totalSessions||0;
  return cards.reduce((sum,p)=>sum+p.sessions,0);
};

function toast(msg, isErr=false){
  const t=$('toast'); $('tmsg').textContent=msg;
  t.style.background=isErr?'#c62828':'#323232';
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2800);
}

let coaches={}, students={}, classLogs={}, payments={};

async function loadAll(){
  const snap=await get(ref(db));
  const d=snap.val()||{};
  coaches=d.coaches||{}; students=d.students||{};
  classLogs=d.classLogs||{}; payments=d.payments||{};
}

async function seedIfEmpty(){
  const snap=await get(ref(db,'coaches'));
  if(snap.exists()) return;
  await set(ref(db,'coaches'),{

// ── Sidebar ──
window.toggleSidebar=function(){

};

// ── Pages ──
window.showPage=function(page){

function myStudents(){
  const all=objArr(students);
  return all;
}

// ── Students ──
window.renderStudents=function(q=''){
  const list=myStudents().filter(s=>!q||(s.name+(s.phone||'')).includes(q));
  // stats
  const low=list.filter(s=>rem(s)>0&&rem(s)<=2);
  const done=list.filter(s=>rem(s)<=0);
  $('student-stats').innerHTML=`
    <div class="stat-card"><div class="stat-num">${list.length}</div><div class="stat-label">學員總數</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--amber)">${low.length}</div><div class="stat-label">即將用完</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--red)">${done.length}</div><div class="stat-label">課堂用完</div></div>`;
  const tbody=$('students-tbody');
  if(!list.length){tbody.innerHTML=`<tr><td colspan="6" class="empty"><i class="ti ti-user-off"></i>尚無學員</td></tr>`;return;}
  tbody.innerHTML=list.map(s=>{
    const r=rem(s);
    const total=remTotal(s);
    const pct=total?Math.max(0,Math.round(r/total*100)):0;
    const coach=coaches[s.coachId];
    const badge=r<=0?'<span class="badge b-red">用完</span>':r<=2?'<span class="badge b-amber">即將用完</span>':'<span class="badge b-green">正常</span>';
    return `<tr>
      <td><strong>${s.name}</strong></td>
      <td>${s.phone||'—'}</td>
      <td>${coach?coach.name:'未指派'}</td>
      <td>
        <div style="font-size:13px">${r}/${s.totalSessions} 堂</div>
        <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
      </td>
      <td>${badge}</td>
      <td>
        <button class="btn btn-outline btn-sm" onclick="goCheckin('${s.id}')"><i class="ti ti-calendar-plus"></i>簽到</button>
        <button class="btn btn-outline btn-sm" onclick="openModal('edit-student','${s.id}')"><i class="ti ti-edit"></i></button>
        ${currentUser.role==='admin'?'<button class="btn btn-danger btn-sm" onclick="delStudent(\''+s.id+'\')" ><i class="ti ti-trash"></i></button>':''}
      </td>
    </tr>`;
  }).join('');
};

window.delStudent=async function(id){

// ── Salary ──
window.renderSalary=function(){
  const now=new Date();
  const firstDay=new Date(now.getFullYear(),now.getMonth(),1);
  const fmt=d=>d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  $('salary-start').value=fmt(firstDay); $('salary-end').value=fmt(now);
  if($('salary-page-title')) $('salary-page-title').textContent=currentUser.name+' 個人薪資';
  $('salary-result').innerHTML='';
};
window.calcSalary=function(){
  const startDate=$('salary-start').value, endDate=$('salary-end').value;
  if(!startDate||!endDate){toast('請選擇日期範圍',true);return;}
  const myLogs=objArr(classLogs).filter(l=>l.coachId===currentUser.id&&l.date>=startDate&&l.date<=endDate);
  const sessionMap={};
  myLogs.forEach(l=>{
    const key=`${l.classType||'個人班'}|${l.date}|${l.time}|${l.timeEnd||''}`;
    if(!sessionMap[key])sessionMap[key]={classType:l.classType||'個人班',date:l.date,time:l.time,timeEnd:l.timeEnd||'',students:[],note:l.note||'',manualPay:l.manualPay||0};
    sessionMap[key].students.push(l.studentId);
    if(l.manualPay!==undefined)sessionMap[key].manualPay=l.manualPay;
  });
  const sessions=Object.values(sessionMap).sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
  function calcHours(s,e){if(!s||!e)return 0;const[sh,sm]=s.split(':').map(Number);const[eh,em]=e.split(':').map(Number);return Math.max(0,((eh*60+em)-(sh*60+sm))/60);}
  let totalHours=0,totalSalary=0;
  const rows=sessions.map(s=>{
    const hours=calcHours(s.time,s.timeEnd);
    const cnt=s.students.length;
    const pay=s.manualPay||0;
    totalHours+=hours; totalSalary+=pay;
    const timeStr=s.time+(s.timeEnd?` ～ ${s.timeEnd}`:'');
    const studentNames=s.students.map(id=>{const st=students[id];return st?st.name:'—';}).join('、');
    return `<tr>
      <td><span class="badge b-blue">${s.classType}</span></td>
      <td>${s.date}</td>
      <td><span style="color:var(--primary);cursor:pointer;font-weight:600;text-decoration:underline" onclick="showStudentPopup('${studentNames}')">${cnt}人</span></td>
      <td>${timeStr}</td>
      <td>${hours>0?hours+'hr':'0'}</td>
      <td style="color:var(--green);font-weight:600">${pay>0?pay+' (待審)':'0 (待審)'}</td>
      <td>${s.note||''}</td>
    </tr>`;
  }).join('');
  $('salary-result').innerHTML=`<div class="card"><div class="table-wrap"><table>
    <thead><tr><th>班別</th><th>日期</th><th>人數</th><th>時間</th><th>時數</th><th>薪資</th><th>備註</th></tr></thead>
    <tbody>${rows||'<tr><td colspan="7" class="empty" style="padding:1.5rem"><i class="ti ti-calendar-off"></i>此區間無上課紀錄</td></tr>'}</tbody>
    <tfoot><tr style="background:#fff8e1;font-weight:600"><td colspan="4" style="padding:10px 12px">總和：</td><td style="padding:10px 12px">${totalHours}hr</td><td style="padding:10px 12px;color:var(--green)">${totalSalary}</td><td></td></tr></tfoot>
  </table></div></div>`;
};

function renderAllSalary(){
  const now=new Date();
  const firstDay=new Date(now.getFullYear(),now.getMonth(),1);
  const fmt=d=>d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  const s=$('all-salary-start'), e=$('all-salary-end');
  if(s) s.value=fmt(firstDay);
  if(e) e.value=fmt(now);
  calcAllSalary();
}
window.calcAllSalary=function(){
  const startDate=$('all-salary-start').value;
  const endDate=$('all-salary-end').value;
  if(!startDate||!endDate) return;
  const allCoaches=objArr(coaches).filter(function(c){return c.role!=='admin';});
  let html='';

  function calcHours(s,e){
    if(!s||!e) return 0;
    var sh=parseInt(s.split(':')[0]),sm=parseInt(s.split(':')[1]);
    var eh=parseInt(e.split(':')[0]),em=parseInt(e.split(':')[1]);
    return Math.max(0,((eh*60+em)-(sh*60+sm))/60);
  }

  allCoaches.forEach(function(coach){
    var myLogs=objArr(classLogs).filter(function(l){
      return l.coachId===coach.id&&l.date>=startDate&&l.date<=endDate;
    });
    var sessionMap={};
    myLogs.forEach(function(l){
      var key=(l.classType||'個人班')+'|'+l.date+'|'+l.time+'|'+(l.timeEnd||'');
      if(!sessionMap[key]) sessionMap[key]={classType:l.classType||'個人班',date:l.date,time:l.time,timeEnd:l.timeEnd||'',students:[],note:l.note||''};
      sessionMap[key].students.push(l.studentId);
    });
    var sessions=Object.values(sessionMap).sort(function(a,b){return (a.date+a.time).localeCompare(b.date+b.time);});
    var totalHours=0, totalSalary=0;

    var tableRows='';
    sessions.forEach(function(s){
      var hours=calcHours(s.time,s.timeEnd);
      var cnt=s.students.length;
      var savedPay=0;
      myLogs.forEach(function(l){if(l.date===s.date&&l.time===s.time&&(l.classType||'個人班')===s.classType&&l.manualPay) savedPay=l.manualPay;});
      totalHours+=hours;
      totalSalary+=savedPay;
      var timeStr=s.time+(s.timeEnd?' ～ '+s.timeEnd:'');
      var studentNames=s.students.map(function(id){return students[id]?students[id].name:'—';}).join('、');
      var sessionKey=coach.id+'|'+s.date+'|'+s.time+'|'+s.classType;
      tableRows+='<tr>'+
        '<td><span class="badge b-blue">'+s.classType+'</span></td>'+
        '<td>'+s.date+'</td>'+
        '<td><span style="color:var(--primary);cursor:pointer;font-weight:600;text-decoration:underline" data-names="'+encodeURIComponent(studentNames)+'" onclick="showStudentPopup(this)">'+cnt+'人</span></td>'+
        '<td>'+timeStr+'</td>'+
        '<td>'+(hours>0?hours+'hr':'0')+'</td>'+
        '<td><input type="number" min="0" value="'+savedPay+'" style="width:90px;padding:4px 8px;border:1px solid var(--border);border-radius:6px;font-size:13px" onchange="saveManualPay(this,this.dataset.key)" data-key="'+sessionKey+'" placeholder="輸入金額"></td>'+
        '<td>'+s.note+'</td>'+
        '</tr>';
    });

    html+='<div class="card" style="margin-bottom:1rem">'+
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;flex-wrap:wrap;gap:.5rem">'+
      '<div style="font-size:15px;font-weight:700">'+coach.name+'</div>'+
      '<div style="font-size:13px;color:var(--text2)">總時數：<strong>'+totalHours+'hr</strong>&ensp;總薪資：<strong style="color:var(--green)">NT$ <span id="total-'+coach.id+'">'+totalSalary+'</span></strong></div>'+
      '</div>'+
      (sessions.length?
        '<div class="table-wrap"><table>'+
        '<thead><tr><th>班別</th><th>日期</th><th>人數</th><th>時間</th><th>時數</th><th>薪資（NT$）</th><th>備註</th></tr></thead>'+
        '<tbody>'+tableRows+'</tbody></table></div>'
        :'<div class="empty" style="padding:1rem"><i class="ti ti-calendar-off"></i>此期間無上課紀錄</div>')+
      '</div>';
  });

  $('all-salary-result').innerHTML=html||'<div class="empty"><i class="ti ti-users-off"></i>無教練資料</div>';
};
window.saveManualPay=async function(inputEl, sessionKey){
  const pay=parseInt(inputEl.value)||0;
  const parts=sessionKey.split('|');
  const coachId=parts[0], date=parts[1], time=parts[2], classType=parts[3];
  const logsToUpdate=objArr(classLogs).filter(function(l){
    return l.coachId===coachId&&l.date===date&&l.time===time&&(l.classType||'個人班')===classType;
  });
  for(var i=0;i<logsToUpdate.length;i++){
    var l=logsToUpdate[i];
    classLogs[l.id].manualPay=pay;
    await update(ref(db,'classLogs/'+l.id),{manualPay:pay});
  }
  var totEl=document.getElementById('total-'+coachId);
  if(totEl){
    var newTotal=0;
    var seen={};
    objArr(classLogs).filter(function(l){return l.coachId===coachId;}).forEach(function(l){
      var k=l.date+'|'+l.time+'|'+(l.classType||'個人班');
      if(!seen[k]){seen[k]=true;newTotal+=(l.manualPay||0);}
    });
    totEl.textContent=newTotal;
  }
  toast('薪資已儲存');
};

function renderCards(){
  window._cardLogsMap = {};
  const allPayments=objArr(payments);
  const list=allPayments.filter(p=>!p.hidden).sort((a,b)=>b.date.localeCompare(a.date));
  const tbody=$('cards-tbody');
  if(!list.length){tbody.innerHTML=`<tr><td colspan="8" class="empty"><i class="ti ti-credit-card-off"></i>尚無課程卡</td></tr>`;return;}
  tbody.innerHTML=list.map(p=>{
    const s=students[p.studentId];
    const c=coaches[p.coachId];
    const used=p.usedSessions||0;
    const r=p.sessions-used;
    const pct=p.sessions?Math.max(0,Math.round(r/p.sessions*100)):0;
    const badge=r<=0?'<span class="badge b-red">用完</span>':r<=2?'<span class="badge b-amber">即將用完</span>':'<span class="badge b-green">有效</span>';
    const allStudentCards=allPayments.filter(c2=>c2.studentId===p.studentId).sort((a,b)=>a.date.localeCompare(b.date)||a.id.localeCompare(b.id));
    const cardIdx=allStudentCards.findIndex(c2=>c2.id===p.id);
    const prevSessions=allStudentCards.slice(0,cardIdx).reduce((sum,c2)=>sum+c2.sessions,0);
    const studentLogs=objArr(classLogs).filter(l=>l.studentId===p.studentId).sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time));
    const cardLogs=studentLogs.slice(prevSessions,prevSessions+p.sessions);
    window._cardLogsMap[p.id]=cardLogs;
    return `<tr>
      <td>${p.date}</td>
      <td><span class="badge b-blue">${p.classType||'—'}</span></td>
      <td><strong>${s?s.name:'—'}</strong></td>
      <td>
        <div style="font-size:14px;font-weight:600;cursor:pointer;color:var(--primary);text-decoration:underline" onclick="showCardLogs('${p.id}')">${r} / ${p.sessions} 堂</div>
        <div class="prog-bar" style="min-width:80px"><div class="prog-fill" style="width:${pct}%"></div></div>
      </td>
      <td style="white-space:nowrap">${c&&c.name?c.name:'未指定'}</td>
      <td style="white-space:nowrap">
        NT$ ${Number(p.amount||0).toLocaleString()}
        <button class="btn btn-outline btn-sm" style="margin-left:6px;padding:3px 8px;font-size:11px" onclick="editCardAmount('${p.id}',${p.amount||0})"><i class="ti ti-edit"></i>修改</button>
      </td>
      <td style="white-space:nowrap">${badge}</td>
      <td style="white-space:nowrap;display:flex;gap:6px">
        <button class="btn btn-danger btn-sm" onclick="hideCard('${p.id}')"><i class="ti ti-eye-off"></i>不顯示</button>
        <button class="btn btn-danger btn-sm" onclick="deleteCard('${p.id}')"><i class="ti ti-trash"></i>刪除</button>
      </td>
    </tr>`;
  }).join('');
}

window.showCardLogs=function(cardId){
  const cardPayment=payments[cardId]||Object.values(payments).find(p=>p.id===cardId);
  const s=cardPayment?students[cardPayment.studentId]:null;
  const studentName=s?s.name:'學員';
  const logs=(window._cardLogsMap&&window._cardLogsMap[cardId])||[];
  const overlay=$('overlay'), modal=$('modal');
  overlay.classList.add('open');
  let rows='';
  if(logs.length){
    logs.forEach(function(l,i){
      const coachName=coaches[l.coachId]?coaches[l.coachId].name:'—';
      const timeStr=l.time+(l.timeEnd?' ～ '+l.timeEnd:'');
      rows+='<tr>'+
        '<td style="padding:8px 12px;border-bottom:1px solid #e0e0e0;text-align:center">'+(i+1)+'</td>'+
        '<td style="padding:8px 12px;border-bottom:1px solid #e0e0e0">'+l.date+'</td>'+
        '<td style="padding:8px 12px;border-bottom:1px solid #e0e0e0">'+timeStr+'</td>'+
        '<td style="padding:8px 12px;border-bottom:1px solid #e0e0e0">'+coachName+'</td>'+
        '</tr>';
    });
  } else {
    rows='<tr><td colspan="4" style="padding:1rem;text-align:center;color:#757575">尚無上課紀錄</td></tr>';
  }
  modal.innerHTML='<div class="modal-head">'+studentName+' 上課紀錄<button class="modal-close" onclick="closeModal()">×</button></div>'+
    '<div class="table-wrap"><table>'+
    '<thead><tr><th style="padding:8px 12px">#</th><th style="padding:8px 12px">日期</th><th style="padding:8px 12px">時間</th><th style="padding:8px 12px">教練</th></tr></thead>'+
    '<tbody>'+rows+'</tbody></table></div>'+
    '<div class="modal-foot"><button class="btn btn-primary" onclick="closeModal()">關閉</button></div>';
};

window.hideCard=async function(id){
  if(!confirm('確定將此課程卡移至歷史？')) return;
  await update(ref(db,'payments/'+id),{hidden:true});
  payments[id].hidden=true;
  renderCards(); toast('已移至課程卡歷史');
};
window.deleteCard=async function(id){
  if(!confirm('確定永久刪除此課程卡？學員堂數將還原。')) return;
  const p=payments[id];
  if(p){
    const s=students[p.studentId];
    if(s){s.totalSessions=Math.max(0,(s.totalSessions||0)-p.sessions);s.usedSessions=Math.max(0,(s.usedSessions||0)-(p.usedSessions||0));await update(ref(db,'students/'+p.studentId),{totalSessions:s.totalSessions,usedSessions:s.usedSessions});}
  }
  await remove(ref(db,'payments/'+id)); delete payments[id];
  renderCards(); toast('課程卡已刪除');
};
window.showStudentPopup=function(el){
  const names=el.dataset?decodeURIComponent(el.dataset.names||''):el;
  const overlay=$('overlay'), modal=$('modal');
  overlay.classList.add('open');
  const list=names.split('、').map(n=>`<div style="padding:8px 12px;border-bottom:1px solid var(--border);font-size:14px">${n}</div>`).join('');
  modal.innerHTML=`<div class="modal-head">上課學員名單<button class="modal-close" onclick="closeModal()">×</button></div>
    <div style="border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:1rem">${list}</div>
    <div class="modal-foot"><button class="btn btn-primary" onclick="closeModal()">關閉</button></div>`;
};
window.editCardAmount=function(cardId, currentAmount){
  const overlay=$('overlay'), modal=$('modal');
  overlay.classList.add('open');
  modal.innerHTML=`<div class="modal-head">修改金額<button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="ff"><label>金額（NT$）</label><input type="number" id="edit-amount-val" value="${currentAmount}" min="0" style="font-size:16px"></div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal()" style="border:1px solid var(--border)">取消</button>
      <button class="btn btn-primary" onclick="submitEditAmount('${cardId}')">儲存</button>
    </div>`;
  setTimeout(()=>{const el=$('edit-amount-val');if(el){el.focus();el.select();}},100);
};

window.submitEditAmount=async function(cardId){
  const val=parseInt($('edit-amount-val').value)||0;
  await update(ref(db,'payments/'+cardId),{amount:val});
  payments[cardId].amount=val;
  closeModal(); renderCards(); toast('金額已更新');
};

        <div class="ff"><label>電話</label><input id="mp" placeholder="09xxxxxxxx"></div>

      <div class="form-grid">

        <div class="ff"><label>電話</label><input id="mp" value="${s.phone||''}"></div>
      </div>

        <div class="ff"><label>總堂數</label><input type="number" id="mt" value="${s.totalSessions||0}" min="0"></div>
        <div class="ff"><label>已上堂數</label><input type="number" id="mu" value="${s.usedSessions||0}" min="0"></div>
      </div>

        <div class="ff"><label>負責教練</label><select id="mc">${coachOpts(s.coachId)}</select></div>
        <div class="ff"><label>加入日期</label><input type="date" id="md" value="${s.joinDate||''}"></div>

      <div class="modal-foot">
        <button class="btn" onclick="closeModal()" style="border:1px solid var(--border)">取消</button>
        <button class="btn btn-primary" onclick="submitEditStudent('${id}')">儲存</button>
      </div>`;

      <div class="ff"><label>學員 *</label><select id="card-student"><option value="">-- 請選擇 --</option>${stuOpts}</select></div>
      <div class="ff"><label>班別 *</label><select id="card-class">
        <option value="個人班">個人班</option>
        <option value="幼兒班">幼兒班</option>
        <option value="團體班">團體班</option>
        <option value="社團">社團</option>
        <option value="校隊">校隊</option>
        <option value="其他">其他</option>
      </select></div>
      <div class="form-grid">
        <div class="ff"><label>購買堂數 *</label><input type="number" id="card-sessions" min="1" value="10"></div>
        <div class="ff"><label>金額（NT$）</label><input type="number" id="card-amount" min="0" value="4000"></div>
      </div>
      <div class="form-grid">
        <div class="ff"><label>購買日期</label><input type="date" id="card-date" value="${new Date().toISOString().slice(0,10)}"></div>
        <div class="ff"><label>負責教練</label><select id="card-coach">${coachOpts(currentUser.role==='coach'?currentUser.id:'')}</select></div>
      </div>
      <div class="ff"><label>備註</label><input id="card-note" placeholder="選填"></div>
      <div class="modal-foot"><button class="btn" onclick="closeModal()" style="border:1px solid var(--border)">取消</button><button class="btn btn-primary" onclick="submitAddCard()">新增課程卡</button></div>`;

window.closeModal=()=>$('overlay').classList.remove('open');

window.submitAddStudent=async function(){
  const name=$('mn').value.trim();
  if(!name){toast('請填寫姓名',true);return;}
  const data={name,phone:$('mp').value.trim(),totalSessions:0,usedSessions:0,coachId:$('mc').value,joinDate:$('md').value,notes:$('mk').value.trim()};
  const newRef=push(ref(db,'students'));
  await set(newRef,data); students[newRef.key]=data;
  closeModal(); renderStudents(''); toast(`${name} 已新增`);
};

window.submitEditStudent=async function(id){
  const s=students[id];
  const data={name:$('mn').value.trim()||s.name,phone:$('mp').value.trim(),totalSessions:parseInt($('mt').value)||0,usedSessions:parseInt($('mu').value)||0,coachId:$('mc').value,joinDate:$('md').value,notes:$('mk').value.trim()};
  await update(ref(db,'students/'+id),data);
  students[id]={...s,...data};
  closeModal(); renderStudents(''); toast('學員資料已更新');
};

window.submitAddCard=async function(){
  const studentId=$('card-student').value;
  const sessions=parseInt($('card-sessions').value)||0;
  const amount=parseInt($('card-amount').value)||0;
  if(!studentId||!sessions){toast('請填寫必填欄位',true);return;}
  const coachId=$('card-coach').value||currentUser.id;
  const s=students[studentId];
  s.totalSessions=(s.totalSessions||0)+sessions;
  await update(ref(db,'students/'+studentId),{totalSessions:s.totalSessions});
  const pData={studentId,coachId,sessions,usedSessions:0,amount,classType:$('card-class').value,date:$('card-date').value,note:$('card-note').value.trim()};
  const newRef=push(ref(db,'payments'));
  await set(newRef,pData); payments[newRef.key]=pData;
  closeModal(); renderCards(); toast(`${s.name} 課程卡新增成功，+${sessions} 堂`);
};

window.submitAddCoach=async function(){
  const name=$('cn').value.trim(),username=$('cu').value.trim(),password=$('cpw').value.trim();
  if(!name||!username||!password){toast('請填寫所有欄位',true);return;}
  if(objArr(coaches).find(c=>c.username===username)){toast('帳號已存在',true);return;}
  const data={name,username,password,role:'coach',salaryPerSession:parseInt($('csal').value)||0};
  const newRef=push(ref(db,'coaches'));
  await set(newRef,data); coaches[newRef.key]=data;
  closeModal(); renderCoaches(); toast(`${name} 帳號已建立`);
};

window.submitEditCoach=async function(id){
  const c=coaches[id];
  const data={name:$('cn').value.trim()||c.name,username:$('cu').value.trim()||c.username,password:$('cpw').value.trim()||c.password,salaryPerSession:parseInt($('csal').value)||0};
  await update(ref(db,'coaches/'+id),data);
  coaches[id]={...c,...data};
  closeModal(); renderCoaches(); toast('教練資料已更新');
};

// ── Checkin ──
function buildTimeOptions(){
  const opts=[];
  for(let h=7;h<=23;h++){
    opts.push(`<option value="${String(h).padStart(2,'0')}:00">${String(h).padStart(2,'0')}:00</option>`);
    opts.push(`<option value="${String(h).padStart(2,'0')}:30">${String(h).padStart(2,'0')}:30</option>`);
  }
  opts.push('<option value="00:00">00:00</option>');
  return opts.join('');
}
function renderCheckin(){
  const startSel=$('ci-start'), endSel=$('ci-end');
  if(!startSel.options.length){startSel.innerHTML=buildTimeOptions();endSel.innerHTML=buildTimeOptions();startSel.value='07:00';endSel.value='08:00';}
  const now=new Date();
  $('ci-date').value=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
  onClassChange();
}
window.onClassChange=function(){
  const cls=$('ci-class').value;
  const cardStudentIds=new Set(objArr(payments).filter(p=>!p.hidden&&p.classType===cls).map(p=>p.studentId));
  const filtered=objArr(students).filter(s=>cardStudentIds.has(s.id));
  const selectedIds=getSelectedIds();
  const available=filtered.filter(s=>!selectedIds.includes(s.id)&&rem(s)>0);
  $('ci-all').innerHTML=available.map(s=>{
    const r=rem(s);
    return `<div data-id="${s.id}" style="padding:8px 10px;border-radius:6px;margin-bottom:4px;background:#f5f5f5;font-size:13px;display:flex;justify-content:space-between;align-items:center;user-select:none">
      <span style="font-weight:500">${s.name}</span><span style="color:${r<=2?'var(--amber)':'var(--text2)'}">剩 ${r} 堂</span>
    </div>`;
  }).join('')||'<div style="padding:1.5rem;color:var(--text3);font-size:13px;text-align:center">此班別無可上課學員</div>';
};
window.onStartChange=function(){
  const [h,m]=$('ci-start').value.split(':').map(Number);
  let eh=h+1; if(eh>=24)eh=0;
  $('ci-end').value=`${String(eh).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
};
function getSelectedIds(){return Array.from($('ci-selected').querySelectorAll('[data-id]')).map(el=>el.dataset.id);}
function updateSelectedCount(){const cnt=getSelectedIds().length;const el=$('ci-selected-count');if(el)el.textContent=cnt?`（${cnt} 人）`:'';}
window.addStudent=function(e){
  const el=e.target.closest('[data-id]'); if(!el)return;
  const id=el.dataset.id; const s=students[id]; if(!s)return;
  const div=document.createElement('div');
  div.dataset.id=id;
  div.style.cssText='padding:8px 10px;border-radius:6px;margin-bottom:4px;background:#e8f5e9;font-size:13px;display:flex;align-items:center;user-select:none';
  div.innerHTML=`<span style="font-weight:500">${s.name}</span>`;
  $('ci-selected').appendChild(div); el.remove(); updateSelectedCount();
};
window.removeStudent=function(e){
  const el=e.target.closest('[data-id]'); if(!el)return;
  el.remove(); updateSelectedCount(); onClassChange();
};
window.doCheckin=async function(){
  const selectedIds=getSelectedIds();
  if(!selectedIds.length){toast('請選擇上課學員',true);return;}
  const date=$('ci-date').value; if(!date){toast('請填寫日期',true);return;}
  const start=$('ci-start').value, end=$('ci-end').value;
  const cls=$('ci-class').value, note=$('ci-note').value.trim();
  const btn=document.querySelector('#page-checkin .btn-success');
  btn.disabled=true; let successCount=0;
  try{
    for(const studentId of selectedIds){
      const s=students[studentId]; if(!s)continue;
      if(rem(s)<=0){toast(`${s.name} 課堂已用完，已略過`,true);continue;}
      const card=objArr(payments).filter(p=>!p.hidden).find(p=>p.studentId===studentId&&p.sessions-(p.usedSessions||0)>0);
      if(card){card.usedSessions=(card.usedSessions||0)+1;await update(ref(db,'payments/'+card.id),{usedSessions:card.usedSessions});payments[card.id]=card;}
      const logData={studentId,coachId:currentUser.id,date,time:start,timeEnd:end,note,classType:cls};
      const newRef=push(ref(db,'classLogs')); await set(newRef,logData); classLogs[newRef.key]=logData;
      successCount++;
    }
    if(successCount>0)toast(`${successCount} 位學員簽到完成 ✓`);
    $('ci-note').value=''; $('ci-selected').innerHTML=''; updateSelectedCount();
    await loadAll(); onClassChange();
  }catch(e){toast('簽到失敗：'+e.message,true);}
  finally{btn.disabled=false;}
};
window.cancelCheckin=async function(logId,studentId){
  if(!confirm('確定取消這筆簽到？將還原一堂課。'))return;
  const s=students[studentId];
  if(s){const card=objArr(payments).filter(p=>!p.hidden).find(p=>p.studentId===studentId&&(p.usedSessions||0)>0);if(card){card.usedSessions=Math.max(0,(card.usedSessions||0)-1);await update(ref(db,'payments/'+card.id),{usedSessions:card.usedSessions});payments[card.id]=card;}}
  await remove(ref(db,'classLogs/'+logId)); delete classLogs[logId];
  const q=document.querySelector('#page-history .search-bar input');
  renderHistory(q?q.value:''); toast('簽到已取消');
};


window.syncCardSessions=async function(){
  const btn=document.querySelector('[onclick="syncCardSessions()"]');
  if(btn){btn.disabled=true;btn.textContent='同步中…';}
  try{
    let fixCount=0;
    const allCards=objArr(payments);
    for(const card of allCards){
      const allStudentCards=allCards.filter(c=>c.studentId===card.studentId).sort((a,b)=>a.date.localeCompare(b.date)||a.id.localeCompare(b.id));
      const cardIdx=allStudentCards.findIndex(c=>c.id===card.id);
      const prevSessions=allStudentCards.slice(0,cardIdx).reduce((sum,c)=>sum+c.sessions,0);
      const studentLogs=objArr(classLogs).filter(l=>l.studentId===card.studentId).sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time));
      const myLogs=studentLogs.slice(prevSessions,prevSessions+card.sessions);
      const realUsed=myLogs.length;
      if(realUsed!==(card.usedSessions||0)){
        await update(ref(db,'payments/'+card.id),{usedSessions:realUsed});
        payments[card.id].usedSessions=realUsed;
        fixCount++;
      }
    }
    const resultEl=$('sync-result');
    if(resultEl) resultEl.textContent=`✓ 同步完成，共修正 ${fixCount} 張課程卡`;
    renderCards(); renderStudents('');
  }catch(e){
    const resultEl=$('sync-result');
    if(resultEl){resultEl.textContent='同步失敗：'+e.message;resultEl.style.color='var(--red)';}
  }finally{
    if(btn){btn.disabled=false;btn.innerHTML='<i class="ti ti-refresh"></i>重新同步課程卡堂數';}
  }
};

function renderCoaches(){
  const tbody=$('coaches-tbody');
  if(!tbody) return;
  tbody.innerHTML=objArr(coaches).map(c=>`<tr>
    <td><strong>${c.name}</strong></td>
    <td>${c.username}</td>
    <td><span class="badge ${c.role==='admin'?'b-amber':'b-blue'}">${c.role==='admin'?'總教練':'教練'}</span></td>
    <td>${objArr(students).filter(s=>s.coachId===c.id).length} 位</td>
    <td>
      <button class="btn btn-outline btn-sm" onclick="openModal('edit-coach','${c.id}')"><i class="ti ti-edit"></i></button>
      ${c.role!=='admin'?'<button class="btn btn-danger btn-sm" onclick="delCoach(\''+c.id+'\')" ><i class="ti ti-trash"></i></button>':''}
    </td>
  </tr>`).join('');
}

window.delCoach=async function(id){
  if(!confirm('確定刪除此教練帳號？')) return;
  await remove(ref(db,'coaches/'+id)); delete coaches[id];
  renderCoaches(); toast('教練已刪除');
};

window.renderHistory=function(q=''){
  const hiddenCards=objArr(payments).filter(p=>p.hidden);
  const hbody=$('hidden-cards-tbody');
  if(hbody){
    hbody.innerHTML=hiddenCards.length?hiddenCards.map(p=>{
      const s=students[p.studentId]; const c=coaches[p.coachId];
      const r=p.sessions-(p.usedSessions||0);
      return `<tr><td>${p.date}</td><td><span class="badge b-blue">${p.classType||'—'}</span></td><td>${s?s.name:'—'}</td><td>${r}/${p.sessions} 堂</td><td style="white-space:nowrap">${c&&c.name?c.name:'未指定'}</td><td style="white-space:nowrap">NT$ ${Number(p.amount||0).toLocaleString()}</td><td>
        <button class="btn btn-outline btn-sm" onclick="restoreCard('${p.id}')"><i class="ti ti-eye"></i>恢復</button>
        ${currentUser.role==='admin'?'<button class="btn btn-danger btn-sm" onclick="deleteCard(\''+p.id+'\')" ><i class="ti ti-trash"></i></button>':''}
      </td></tr>`;
    }).join(''):`<tr><td colspan="7" class="empty" style="padding:1rem">無隱藏課程卡</td></tr>`;
  }
  window.restoreCard=async function(id){
    await update(ref(db,'payments/'+id),{hidden:false});
    payments[id].hidden=false;
    renderHistory(''); renderCards(); toast('課程卡已恢復顯示');
  };
};
window.changePassword=async function(){
  const oldPw=$('pw-old').value,newPw=$('pw-new').value,conf=$('pw-confirm').value;
  if(!oldPw||!newPw||!conf){toast('請填寫所有欄位',true);return;}
  if(oldPw!==currentUser.password){toast('目前密碼錯誤',true);return;}
  if(newPw!==conf){toast('新密碼與確認密碼不一致',true);return;}
  if(newPw.length<4){toast('密碼至少需要4個字元',true);return;}
  await update(ref(db,'coaches/'+currentUser.id),{password:newPw});
  currentUser.password=newPw; coaches[currentUser.id].password=newPw;
  $('pw-old').value='';$('pw-new').value='';$('pw-confirm').value='';
  toast('密碼已更新！');
};
</script>
